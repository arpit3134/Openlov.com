<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenLov — Signal News</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#f9f8f5; --ink:#1a1814; --accent:#e8420a; --sans:'DM Sans',sans-serif; --serif:'Playfair Display',serif; }
        body { background: var(--bg); color: var(--ink); font-family: var(--sans); margin: 0; }
        header { padding: 40px 20px; border-bottom: 1px solid #e0ddd6; text-align: center; background: #fff; position: sticky; top:0; z-index:100; }
        .logo { font-family: var(--serif); font-size: 42px; font-weight: 900; text-decoration: none; color: var(--ink); letter-spacing: -2px; }
        .nav-links { margin-top: 15px; display: flex; justify-content: center; gap: 20px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .nav-links a { text-decoration: none; color: var(--ink); }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 2px; background: #e0ddd6; border: 1px solid #e0ddd6; max-width: 1400px; margin: 0 auto; }
        .feat-card { background: #fff; padding: 40px; cursor: pointer; transition: all 0.3s; display: flex; flex-direction: column; justify-content: space-between; min-height: 350px; }
        .feat-card:hover { background: #fdfcf9; }
        .tag { color: var(--accent); text-transform: uppercase; font-size: 11px; font-weight: 800; letter-spacing: 1.5px; margin-bottom: 20px; display: block; }
        .card-title { font-family: var(--serif); font-size: 32px; line-height: 1.1; font-weight: 800; margin-bottom: 20px; text-transform: capitalize; }
        .card-meta { font-size: 13px; color: #7a7670; font-weight: 500; display: flex; align-items: center; gap: 10px; }
        .dot { width: 4px; height: 4px; background: #e0ddd6; border-radius: 50%; }
        footer { text-align: center; padding: 40px; border-top: 1px solid #e0ddd6; font-size: 11px; color: #999; }
    </style>
</head>
<body>
<header>
    <a href="/" class="logo">OPENLOV</a>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/pages/privacy.html">Privacy</a>
        <a href="/pages/about.html">About</a>
        <a href="/pages/contact.html">Contact</a>
    </div>
</header>
<div class="grid-container" id="article-grid"></div>
<footer>© 2026 OPENLOV — THE SIGNAL FOR CRICKET</footer>
<script>
    async function fetchPosts() {
        try {
            const res = await fetch('https://api.github.com/repos/arpit3134/Openlov.com/contents/articles');
            const files = await res.json();
            const grid = document.getElementById('article-grid');
            grid.innerHTML = '';
            files.filter(f => f.name.endsWith('.html')).reverse().forEach(file => {
                const title = file.name.replace('.html', '').split('-').slice(1).join(' ');
                const div = document.createElement('div');
                div.className = 'feat-card';
                div.onclick = () => window.location.href = 'articles/' + file.name;
                div.innerHTML = `<div><span class="tag">Cricket News</span><h2 class="card-title">${title}</h2></div><div class="card-meta"><span>By OpenLov Editor</span><div class="dot"></div><span>Latest Story</span></div>`;
                grid.appendChild(div);
            });
        } catch(e) { console.error("Error loading posts"); }
    }
    fetchPosts();
</script>
</body>
</html>
