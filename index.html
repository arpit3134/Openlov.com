<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenLov — Cricket News</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <style>
        /* Aapki file ka original style yahan maintain rahega */
        :root { --bg:#f9f8f5; --ink:#1a1814; --accent:#e8420a; --sans:'DM Sans',sans-serif; --serif:'Playfair Display',serif; }
        body { background: var(--bg); color: var(--ink); font-family: var(--sans); margin: 0; padding: 0; }
        header { padding: 40px 20px; border-bottom: 1px solid #e0ddd6; text-align: center; }
        .logo { font-family: var(--serif); font-size: 48px; font-weight: 900; text-decoration: none; color: var(--ink); letter-spacing: -2px; }
        .nav-links { margin-top: 20px; display: flex; justify-content: center; gap: 30px; font-weight: 600; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
        .nav-links a { text-decoration: none; color: var(--ink); }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; padding: 40px 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: #fff; border: 1px solid #e0ddd6; padding: 25px; transition: transform 0.3s ease; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; height: 100%; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .tag { color: var(--accent); text-transform: uppercase; font-size: 11px; font-weight: 800; letter-spacing: 1px; margin-bottom: 15px; display: block; }
        .card-title { font-family: var(--serif); font-size: 24px; line-height: 1.2; margin-bottom: 15px; font-weight: 700; text-transform: capitalize; }
        .card-meta { font-size: 12px; color: #7a7670; font-weight: 500; }
        footer { text-align: center; padding: 60px 20px; border-top: 1px solid #e0ddd6; font-size: 12px; color: #7a7670; }
    </style>
</head>
<body>

<header>
    <a href="/" class="logo">OpenLov</a>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/pages/privacy.html">Privacy</a>
        <a href="/pages/contact.html">Contact</a>
    </div>
</header>

<div class="grid-container" id="posts-container">
    <p style="text-align:center; grid-column: 1/-1;">Loading latest stories...</p>
</div>

<footer>
    © 2026 OPENLOV — THE SIGNAL FOR WHAT'S NEXT
</footer>

<script>
    async function loadPosts() {
        try {
            const res = await fetch('https://api.github.com/repos/arpit3134/Openlov.com/contents/articles');
            const files = await res.json();
            const container = document.getElementById('posts-container');
            container.innerHTML = '';

            files.reverse().forEach(file => {
                if(file.name.endsWith('.html')) {
                    // Title formatting
                    const rawTitle = file.name.replace('.html', '').split('-').slice(1).join(' ');
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => window.location.href = 'articles/' + file.name;
                    card.innerHTML = `
                        <div>
                            <span class="tag">Cricket News</span>
                            <h2 class="card-title">${rawTitle}</h2>
                        </div>
                        <div class="card-meta">By AI Editor • Mar 2026</div>
                    `;
                    container.appendChild(card);
                }
            });
        } catch(e) {
            document.getElementById('posts-container').innerHTML = '<p>Failed to load articles.</p>';
        }
    }
    loadPosts();
</script>

</body>
</html>
