<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenLov — Cricket Signal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* --- AAPKA ORIGINAL PREMIUM CSS --- */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f9f8f5;--ink:#1a1814;--ink2:#4a4640;--ink3:#9a9690;--accent:#e8420a;--border:#e0ddd6;--card:#fff;--serif:'Playfair Display',serif;--sans:'DM Sans',sans-serif;--mono:'DM Mono',monospace;--ease:cubic-bezier(.22,1,.36,1)}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);overflow-x:hidden}
nav{position:fixed;top:0;left:0;right:0;z-index:200;height:58px;padding:0 5vw;display:flex;align-items:center;justify-content:space-between;background:rgba(249,248,245,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-logo{font-family:var(--serif);font-size:1.35rem;font-weight:700;color:var(--ink);text-decoration:none;letter-spacing:-.03em;display:flex;align-items:center;gap:.4rem}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
.nav-links{display:flex;gap:1.5rem}
.nav-links a{text-decoration:none;font-size:.8rem;font-weight:600;color:var(--ink2);text-transform:uppercase;letter-spacing:1px}

/* DYNAMIC CONTENT GRID */
.hero{padding:120px 5vw 60px; text-align:center; border-bottom:1px solid var(--border); background:#fff}
.hero h1{font-family:var(--serif); font-size:clamp(2.5rem,8vw,4.5rem); letter-spacing:-3px; line-height:1}
.main-wrap{max-width:1200px; margin:0 auto; padding:60px 5vw}
.grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(350px, 1fr)); gap:30px}
.card{background:var(--card); border:1.5px solid var(--border); border-radius:16px; padding:40px; cursor:pointer; transition:all .3s var(--ease); display:flex; flex-direction:column; justify-content:space-between; min-height:400px}
.card:hover{transform:translateY(-5px); box-shadow:0 20px 40px rgba(0,0,0,0.05); border-color:var(--ink)}
.tag{color:var(--accent); text-transform:uppercase; font-size:11px; font-weight:800; letter-spacing:1.5px; margin-bottom:20px; display:block}
.card-title{font-family:var(--serif); font-size:28px; line-height:1.2; font-weight:800; margin-bottom:20px}
.card-meta{font-size:12px; color:var(--ink3); font-family:var(--mono); display:flex; align-items:center; gap:8px}
.dot{width:4px; height:4px; background:var(--border); border-radius:50%}

footer{padding:60px; text-align:center; border-top:1px solid var(--border); font-family:var(--mono); font-size:10px; color:var(--ink3); text-transform:uppercase; letter-spacing:2px}
</style>
</head>
<body>

<nav>
    <a href="/" class="nav-logo"><div class="logo-dot"></div> OPENLOV</a>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/pages/about.html">About</a>
        <a href="/pages/privacy.html">Privacy</a>
    </div>
</nav>

<div class="hero">
    <h1>The Cricket <em>Signal</em>.</h1>
    <p style="margin-top:20px; color:var(--ink2)">Real-time insights from the world of cricket.</p>
</div>

<div class="main-wrap">
    <div class="grid" id="post-container">
        </div>
</div>

<footer>© 2026 OPENLOV — DECODING THE GAME</footer>

<script>
async function loadPosts() {
    const container = document.getElementById('post-container');
    try {
        const response = await fetch('https://api.github.com/repos/arpit3134/Openlov.com/contents/articles');
        const files = await response.json();
        container.innerHTML = '';
        
        // Filter only HTML files and reverse for latest first
        const posts = files.filter(f => f.name.endsWith('.html')).reverse();
        
        posts.forEach(file => {
            const title = file.name.replace('.html', '').split('-').slice(1).join(' ');
            container.innerHTML += `
                <div class="card" onclick="location.href='articles/${file.name}'">
                    <div>
                        <span class="tag">Live Update</span>
                        <h2 class="card-title">${title}</h2>
                    </div>
                    <div class="card-meta">
                        <span>BY OPENLOV EDITOR</span>
                        <div class="dot"></div>
                        <span>MARCH 2026</span>
                    </div>
                </div>`;
        });
    } catch(e) {
        container.innerHTML = '<p>Loading latest cricket signals...</p>';
    }
}
loadPosts();
</script>

</body>
</html>
