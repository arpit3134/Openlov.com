<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenLov — The Signal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <style>
        /* Exact Original Design Styles */
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--bg:#f9f8f5;--ink:#1a1814;--accent:#e8420a;--border:#e0ddd6;--serif:'Playfair Display',serif;--sans:'DM Sans',sans-serif}
        body{background:var(--bg);color:var(--ink);font-family:var(--sans);overflow-x:hidden}
        
        header{padding:60px 20px 40px;text-align:center;border-bottom:1px solid var(--border);background:#fff;position:relative;z-index:10}
        .logo{font-family:var(--serif);font-size:clamp(40px,10vw,80px);font-weight:900;letter-spacing:-4px;text-decoration:none;color:var(--ink);line-height:.8}
        
        .nav-main{display:flex;justify-content:center;gap:30px;padding:20px;border-bottom:1px solid var(--border);background:#fff;position:sticky;top:0;z-index:100;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
        .nav-main a{text-decoration:none;color:var(--ink)}

        /* The Dynamic Grid */
        .main-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(350px, 1fr));background:var(--border);gap:1px;border-bottom:1px solid var(--border)}
        
        .feat-card{background:#fff;padding:40px;min-height:450px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;transition:background .3s var(--ease)}
        .feat-card:hover{background:#fdfcf9}
        
        .tag{color:var(--accent);text-transform:uppercase;font-size:11px;font-weight:800;letter-spacing:1.5px;margin-bottom:20px;display:block}
        .card-title{font-family:var(--serif);font-size:36px;line-height:1.1;font-weight:800;margin-bottom:20px;letter-spacing:-1px}
        .card-meta{display:flex;align-items:center;gap:10px;font-size:13px;color:#7a7670;font-weight:500}
        .dot{width:4px;height:4px;background:var(--border);border-radius:50%}

        footer{padding:80px 20px;text-align:center;font-size:12px;color:#999;letter-spacing:1px}
    </style>
</head>
<body>

<header>
    <a href="/" class="logo">OPENLOV</a>
</header>

<nav class="nav-main">
    <a href="/">Home</a>
    <a href="/pages/about.html">About</a>
    <a href="/pages/privacy.html">Privacy</a>
    <a href="/pages/contact.html">Contact</a>
</nav>

<div class="main-grid" id="dynamic-grid">
    </div>

<footer>
    © 2026 OPENLOV — POWERED BY THE SIGNAL DESIGN
</footer>

<script>
    async function loadArticles() {
        const grid = document.getElementById('dynamic-grid');
        try {
            const res = await fetch('https://api.github.com/repos/arpit3134/Openlov.com/contents/articles');
            const files = await res.json();
            grid.innerHTML = '';
            
            files.filter(f => f.name.endsWith('.html')).reverse().forEach(file => {
                const title = file.name.replace('.html', '').split('-').slice(1).join(' ');
                grid.innerHTML += `
                    <div class="feat-card" onclick="window.location.href='articles/${file.name}'">
                        <div>
                            <span class="tag">Cricket Update</span>
                            <h2 class="card-title">${title}</h2>
                        </div>
                        <div class="card-meta">
                            <span>By Admin</span>
                            <div class="dot"></div>
                            <span>Mar 2026</span>
                        </div>
                    </div>`;
            });
        } catch(e) {
            grid.innerHTML = '<p style="padding:40px; background:#fff;">Articles loading...</p>';
        }
    }
    loadArticles();
</script>

</body>
</html>
