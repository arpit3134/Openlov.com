<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenLov — Cricket News</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#f9f8f5; --ink:#1a1814; --accent:#e8420a; --sans:'DM Sans',sans-serif; --serif:'Playfair Display',serif; }
        body { background: var(--bg); color: var(--ink); font-family: var(--sans); margin: 0; }
        header { padding: 40px 20px; border-bottom: 1px solid #e0ddd6; text-align: center; background: #fff; }
        .logo { font-family: var(--serif); font-size: 52px; font-weight: 900; text-decoration: none; color: var(--ink); letter-spacing: -2px; }
        .nav-links { margin-top: 15px; display: flex; justify-content: center; gap: 25px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; }
        .nav-links a { text-decoration: none; color: var(--ink); opacity: 0.7; }
        .nav-links a:hover { opacity: 1; color: var(--accent); }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 40px; padding: 50px 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: #fff; border: 1px solid #e0ddd6; padding: 30px; transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); cursor: pointer; position: relative; }
        .card:hover { transform: translateY(-8px); shadow: 0 20px 40px rgba(0,0,0,0.05); border-color: var(--accent); }
        .tag { color: var(--accent); text-transform: uppercase; font-size: 10px; font-weight: 800; letter-spacing: 1.2px; margin-bottom: 20px; display: block; }
        .card-title { font-family: var(--serif); font-size: 26px; line-height: 1.2; margin-bottom: 20px; font-weight: 700; color: var(--ink); }
        .card-meta { font-size: 12px; color: #9a9690; border-top: 1px solid #f0ede6; pt: 15px; display: flex; align-items: center; gap: 10px; margin-top: 20px; padding-top: 15px;}
        footer { text-align: center; padding: 80px 20px; background: #1a1814; color: #fff; font-size: 11px; letter-spacing: 2px; margin-top: 50px; }
    </style>
</head>
<body>

<header>
    <a href="/" class="logo">OpenLov</a>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/pages/privacy.html">Privacy</a>
        <a href="/pages/contact.html">Contact</a>
    </div>
</header>

<div class="grid-container" id="posts-container"></div>

<footer>© 2026 OPENLOV — THE SIGNAL FOR CRICKET</footer>

<script>
    async function loadPosts() {
        const res = await fetch('https://api.github.com/repos/arpit3134/Openlov.com/contents/articles');
        const files = await res.json();
        const container = document.getElementById('posts-container');
        
        files.reverse().forEach(file => {
            if(file.name.endsWith('.html')) {
                // Formatting Title: Removing date and dashes
                let title = file.name.replace('.html', '').split('-').slice(4).join(' ');
                if(!title) title = "Cricket Update: Latest News";
                
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => window.location.href = 'articles/' + file.name;
                card.innerHTML = `
                    <span class="tag">Live Update</span>
                    <h2 class="card-title">${title}</h2>
                    <div class="card-meta">
                        <span>By AI Editor</span>
                        <span style="color:#e0ddd6">|</span>
                        <span>Mar 22, 2026</span>
                    </div>`;
                container.appendChild(card);
            }
        });
    }
    loadPosts();
</script>
</body>
</html>
